#Это эталонная конфигурация для языка по умолчанию; изменять её не нужно — она не выполняет никакой функции. Все правки вносите в основной файл конфигурации.
#This is the reference configuration for the default language; you do not need to modify it, as it serves no active purpose. Instead, make your changes in the main config file.
#Это эталонная конфигурация для языка по умолчанию; изменять её не нужно — она не выполняет никакой функции. Все правки вносите в основной файл конфигурации.

version: "1.2"  # Do not change this line
Debug: false
camera-mode:
  # Whether to force a switch to adventure mode when entering the camera perspective
  force-adventure: true


messages:
  prefix: '&f[&eCustomScreenMenu&f] '
  command_blocked: '&cCommands are disabled while in fixed-camera mode!'

sound:
  name: 'music.menu'
  volume: 1
  pitch: 1
  loop:
    enabled: true
    duration: 30  # seconds between each loop

join-run:
  enabled: false
  delay: 3        # seconds after joining before the menu opens
  menu: 'test'    # menu section to display

cursor-item:
  material: 'ARROW'
  custom-model-data: 0
  scale: 0.5
  max-x: 3        # maximum horizontal screen coverage
  max-y: 1.5      # maximum vertical screen coverage
  z-offset: 0.0   # forward/backward offset from the camera plane

menu:
  example:
    # Permission required to open the entire test menu, leave blank for anyone to open
    permission: cursormenu.menu.example

    auto-commands:
      enabled: true
      commands:
        - "[console] say Welcome to the lobby menu, executing after 3 seconds"
        - "[op] say This command executes after 5 seconds"
      delays:
        - 60   # 3 seconds = 60 ticks
        - 100  # 5 seconds = 100 ticks

    # Button position
    camera-position:
      # Distance from the text component
      distance: 1.5
      world: world
      x: 0
      y: 78
      z: 0
      yaw: 0 # Horizontal rotation angle (0-360)
      pitch: 0.0 # Vertical rotation angle (-90 to 90)
    layout:
      # Text component 1
      layout1:
        permission: cursormenu.button.test.layout1
        name: "Sater"
        # X-axis of the text component
        x: 0
        # Y-axis of the text component
        y: 0
        # Z-axis of the text component
        z: 0.0
        tilt:
          x: 0.0 # Pitch (up/down)
          y: 0.0 # Yaw (left/right)
          z: 0.0 # Roll (tilt sideways)
        # PAPI condition check
        condition:
          variable: "%player_level%"  # PAPI variable
          operator: ">="              # Operator: >, >=, <, <=, ==, !=
          value: "10"                 # Value to compare
        # Commands to execute on click
        command:
          - '[op] say hello'
          - '[server] lobby' # Velocity server command example
        # Random command execution (optional)
        # random-commands:
        #   - '[player] give %player% diamond 1'
        #   - '[player] give %player% iron_ingot 5'
        #   - '[console] say %player% received a random reward!'
        # random-chances:
        #   - 10  # 10% chance to get diamonds
        #   - 50  # 50% chance to get iron ingots
        #   - 40  # 40% chance to get a message
        command-delay: 6 # Command execution delay (ticks)
        next-menu:
          enabled: false
          menu: lobby
        # Whether to end the menu after clicking
        stop-menu:
          enabled: false
          teleport:
            enabled: false # Whether to enable teleport function (default false)
            back-original: false # Whether to return to the original position before entering the menu (true: original position; false: custom coordinates)
            world: world # Target world name (effective when back-original is false)
            x: 0.0 # Target X coordinate
            y: 64.0 # Target Y coordinate
            z: 0.0 # Target Z coordinate

  test:
    camera-position:
      distance: 1.5
      world: "world"
      x: 0
      y: 2
      z: 0
      yaw: 0.0      # горизонтальный угол в градусах (0–360)
      pitch: 0.0    # вертикальный угол в градусах (-90–90)
    layout:
      layout1:
        name: "Начать игру"
        x: 0
        y: 0
        z: 0
        tilt:
          x: 0.0    # наклон вверх/вниз
          y: 0.0    # поворот влево/вправо
          z: 0.0    # наклон вбок
        command:
          - '[player] say test'
          - '[op] give %player% stone 1'
        stop-menu:
          enabled: false
          teleport:
            enabled: false
            back-original: true
            world: 'world'
            x: 10
            y: 80
            z: 10
          command:
            enabled: false
            list:
              - '[player] say stop'

      layout2:
        name: "Настройки"
        x: 0
        y: -1
        z: 0
        tilt:
          x: 0.0
          y: 0.0
          z: 0.0
        command:
          - '[player] say test'
          - '[op] give %player% stone 1'
        stop-menu:
          enabled: false
          teleport:
            enabled: false
            world: 'world'
            x: 20
            y: 90
            z: 20
          command:
            enabled: false
            list:
              - '[player] say stop'

  lobby:
    camera-position:
      distance: 2
      world: "world"
      x: 0
      y: 100
      z: 0
      yaw: 0.0      # горизонтальный угол в градусах (0–360)
      pitch: 0.0    # вертикальный угол в градусах (-90–90)
    layout:
      layout1:
        name: "Старт"
        x: 0
        y: 0
        z: 0
        tilt:
          x: 0.0    # наклон вверх/вниз
          y: 0.0    # поворот влево/вправо
          z: 0.0    # наклон вбок
        command:
          - '[player] say test'
          - '[op] give %player% stone 1'
        stop-menu:
          enabled: false
          teleport:
            enabled: false
            world: 'world'
            x: 10
            y: 80
            z: 10
          command:
            enabled: false
            list:
              - '[player] say stop'

      layout2:
        name: "Параметры"
        x: 0
        y: -1
        z: 0
        tilt:
          x: 0.0
          y: 0.0
          z: 0.0
        command:
          - '[player] say test'
          - '[op] give %player% stone 1'
        stop-menu:
          enabled: false
          teleport:
            enabled: false
            world: 'world'
            x: 20
            y: 90
            z: 20
          command:
            enabled: false
            list:
              - '[player] say stop'