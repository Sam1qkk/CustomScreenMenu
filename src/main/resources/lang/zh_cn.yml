  #This is the reference configuration for the default language; you do not need to modify it, as it serves no active purpose. Instead, make your changes in the main config file.
  #This is the reference configuration for the default language; you do not need to modify it, as it serves no active purpose. Instead, make your changes in the main config file.

version: "1.2"  # Do not change this line
Debug: false
camera-mode:
  # Whether to force a switch to adventure mode when entering the camera perspective
  force-adventure: true


messages:
  prefix: '&f[&eCustomScreenMenu&f] '
  command_blocked: '&cCommands are disabled while in fixed-camera mode!'

sound:
  name: 'music.menu'
  volume: 1
  pitch: 1
  loop:
    enabled: true
    duration: 30  # seconds between each loop

join-run:
  enabled: false
  delay: 3        # seconds after joining before the menu opens
  menu: 'test'    # menu section to display

cursor-item:
  material: 'ARROW'
  custom-model-data: 0
  scale: 0.5
  max-x: 3        # maximum horizontal screen coverage
  max-y: 1.5      # maximum vertical screen coverage
  z-offset: 0.0   # forward/backward offset from the camera plane

menu:
  example:
    # 打开整个 test 菜单所需的权限，不写则任何人可开
    permission: cursormenu.menu.example

    auto-commands:
      enabled: true
      commands:
        - "[console] say 欢迎进入大厅菜单，3秒后执行"
        - "[op] say 这是5秒后执行的命令"
      delays:
        - 60   # 3秒 = 60 ticks
        - 100  # 5秒 = 100 ticks

    # 按钮所在的位置
    camera-position:
      # 与文字组件的距离
      distance: 1.5
      world: world
      x: 0
      y: 2
      z: 0
      yaw: 0.0    # 水平旋转角度 (0-360)
      pitch: 0.0  # 垂直旋转角度 (-90到90)
    layout:
      # 文字组件1
      layout1:
        name: "开始游戏"
        # 文字组件的x轴
        x: 0
        # 文字组件的y轴
        y: 0
        # 文字组件的z轴
        z: 0.0
        tilt:
          x: 0.0   # 上下倾斜（俯仰）
          y: 0.0   # 左右倾斜（偏航）
          z: 0.0   # 前后倾斜（翻滚）
        # 点击的执行命令
        command:
          - '[player] say test'
          - '[op] give %player% stone 1'
          - '[server] survival'  # Velocity跨服命令示例
        # 点击后是否结束菜单
        stop-menu:
          enabled: false
          # 结束后传送
          teleport:
            enabled: false
            # 返回原本位置 或 返回指定位置
            back-original: true
            world: 'world'
            x: 10
            y: 80
            z: 10
          # 结束后执行的命令
          command:
            enabled: false
            list:
              - '[player] say stop'

      # 文字组件2
      layout2:
        name: "选项设置"
        x: 0
        y: -1
        z: 0.0
        tilt:
          x: 0.0   # 上下倾斜（俯仰）
          y: 0.0   # 左右倾斜（偏航）
          z: 0.0   # 前后倾斜（翻滚）
        command:
          - '[player] say test'
          - '[op] give %player% stone 1'
          - '[server] lobby'  # Velocity跨服命令示例
        stop-menu:
          enabled: false
          teleport:
            enabled: false
            world: 'world'
            x: 20
            y: 90
            z: 20
          command:
            enabled: false
            list:
              - '[player] say stop'

  lobby:
    camera-position:
      distance: 2
      world: "world"
      x: 0
      y: 100
      z: 0
      yaw: 0.0    # 水平旋转角度 (0-360)
      pitch: 0.0  # 垂直旋转角度 (-90到90)
    layout:
      layout1:
        name: "开始"
        x: 0
        y: 0
        z: 0
        tilt:
          x: 0.0   # 上下倾斜（俯仰）
          y: 0.0   # 左右倾斜（偏航）
          z: 0.0   # 前后倾斜（翻滚）
        command:
          - '[player] say test'
          - '[op] give %player% stone 1'
          - '[server] survival'  # Velocity跨服命令示例
        stop-menu:
          enabled: false
          teleport:
            enabled: false
            world: 'world'
            x: 10
            y: 80
            z: 10
          command:
            enabled: false
            list:
              - '[player] say stop'

      layout2:
        name: "选项"
        x: 0
        y: -1
        z: 0
        tilt:
          x: 0.0   # 上下倾斜（俯仰）
          y: 0.0   # 左右倾斜（偏航）
          z: 0.0   # 前后倾斜（翻滚）
        command:
          - '[player] say test'
          - '[op] give %player% stone 1'
          - '[server] minigames'  # Velocity跨服命令示例
        stop-menu:
          enabled: false
          teleport:
            enabled: false
            world: 'world'
            x: 20
            y: 90
            z: 20
          command:
            enabled: false
            list:
              - '[player] say stop'