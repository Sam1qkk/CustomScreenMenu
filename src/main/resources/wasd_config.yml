# ===========================================
# WASD导航系统配置文件
# CustomScreenMenu WASD Navigation Module
# ===========================================
#
# enabled: 是否启用WASD导航功能
# debug-mode: 调试模式，输出详细日志
#
# navigation: 导航设置
#   horizontal-threshold: 水平方向选择阈值
#   dot-product-threshold: 左右方向点积阈值
#   selection-cooldown: 选择冷却时间(毫秒)
#
# sound: 音效设置
# menu-settings: 菜单关联设置
# disabled-players: 禁用WASD导航的玩家列表

enabled: true
debug-mode: false

navigation:
  horizontal-threshold: 0.5
  dot-product-threshold: 0.5
  selection-cooldown: 500

sound:
  enabled: true
  selection-sound: "minecraft:entity.experience_orb.pickup"
  volume: 1.0
  pitch: 1.0

# 菜单关联设置
menu-settings:
  # 是否对所有菜单启用WASD导航（true=全部启用）
  enable-for-all-menus: true
  # 启用WASD导航的菜单列表
  enabled-menus: []
  # 是否使用白名单模式（true=仅列表中的菜单启用，false=列表中的菜单禁用）
  use-whitelist-mode: false

# 禁用WASD导航的玩家列表（小写）
disabled-players: []
