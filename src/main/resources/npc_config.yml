# ===========================================
# NPC镜像系统配置文件
# CustomScreenMenu NPC Mirror Module
# ===========================================
#
# enabled: 是否启用NPC镜像功能
# debug-mode: 调试模式，输出详细日志
#
# offset: NPC相对于玩家位置的偏移量
# default-yaw/pitch: NPC默认朝向
#
# auto-rotate: 自动旋转设置
# sync: 同步设置（装备、皮肤）
# disabled-worlds: 禁用NPC的世界列表
# disabled-players: 禁用NPC的玩家UUID列表
#
# menu-settings: 菜单关联设置
# name-display: NPC名称显示设置

enabled: true
debug-mode: false
offset:
  x: 2.0
  y: 0.0
  z: -4.0
default-yaw: 180.0
default-pitch: 0.0
auto-rotate:
  enabled: false
  speed: 1.0
sync:
  equipment: true
  skin: true
disabled-worlds: []
disabled-players: []

# 菜单关联设置
menu-settings:
  # 是否对所有菜单启用NPC（true=全部启用）
  enable-for-all-menus: false
  # 启用NPC的菜单列表
  enabled-menus: ["example"]
  # 是否使用白名单模式（true=仅列表中的菜单启用，false=列表中的菜单禁用）
  use-whitelist-mode: true

# NPC名称显示设置
name-display:
  # 是否显示NPC头顶名称
  show: true
  # 名称格式，支持颜色代码和占位符
  # %player% - 玩家名称
  # %displayname% - 玩家显示名称
  # & 颜色代码，如 &e 表示黄色
  # 支持PlaceholderAPI变量，如 %player_level%, %player_money%, %vault_eco_balance% 等
  format: "&e%player%"
  # 名称是否始终可见（不被方块遮挡）
  always-visible: true
